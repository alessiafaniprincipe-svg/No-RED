<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>No RED!</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 900px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px;
            text-align: center;
        }

        /* SCREEN 1: START SCREEN */
        #screen-start {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            width: 100%;
        }

        .header-section {
            margin-top: 40px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: #3b82f6;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .icon-container {
            margin: 20px auto;
            width: 120px;
            height: 120px;
            border-radius: 24px;
            background-color: #ef4444;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4);
        }

        .icon-cross {
            position: absolute;
            width: 140px;
            height: 15px;
            background-color: #f8fafc;
            transform: rotate(45deg);
            border-radius: 10px;
            border: 4px solid #0f172a;
        }

        .instructions {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #cbd5e1;
            padding: 0 20px;
        }

        .instructions span {
            color: #ef4444;
            font-weight: bold;
        }

        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
            transition: transform 0.1s ease;
            width: 100%;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* SCREEN 2: GAMEPLAY */
        #screen-game {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            width: 100%;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #94a3b8;
            padding: 10px 5px;
        }

        .score-val {
            color: #f8fafc;
            font-size: 2rem;
        }

        .color-block {
            flex-grow: 1;
            margin: 20px 0;
            border-radius: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.2);
            transition: background-color 0.1s ease;
        }

        .tap-prompt {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        /* DODGE BUTTON */
        .dodge-container {
            height: 80px;
            margin-bottom: 20px;
            display: none;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .btn-dodge {
            background-color: #3b82f6;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            width: 100%;
            height: 100%;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-dodge:active {
            transform: scale(0.98);
        }

        /* SCREEN 3: GAME OVER */
        #screen-gameover {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            width: 100%;
        }

        .gameover-title {
            font-size: 3rem;
            color: #ef4444;
            font-weight: 900;
            margin-top: 40px;
        }

        .results-box {
            background-color: #1e293b;
            border-radius: 24px;
            padding: 30px;
            margin: 40px 0;
            border: 2px solid #334155;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 1.4rem;
        }

        .result-row span:last-child {
            font-weight: bold;
            color: #3b82f6;
        }

        .btn-retry {
            background-color: #3b82f6;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- PANTALLA INICIO -->
        <div id="screen-start">
            <div class="header-section">
                <h1>No RED!</h1>
                <div class="icon-container">
                    <div class="icon-cross"></div>
                </div>
            </div>
            
            <p class="instructions">
                Toca el color para sumar puntos.<br><br>
                ¡Si es <span>ROJO</span>, no lo toques! Usa el botón <span>ESQUIVAR</span> de abajo.
            </p>
            
            <button class="btn" onclick="startGame()">START</button>
        </div>

        <!-- PANTALLA JUEGO -->
        <div id="screen-game">
            <div class="score-bar">
                <div>SCORE: <span id="score" class="score-val">0</span></div>
                <div>RÉCORD: <span id="high-score">0</span></div>
            </div>
            
            <div id="color-block" class="color-block" onclick="handleBlockTap()">
                <div id="tap-prompt" class="tap-prompt">¡TOCA!</div>
            </div>

            <!-- Botón de esquivar -->
            <div id="dodge-container" class="dodge-container">
                <button class="btn-dodge" onclick="handleDodge()">🛡️ ESQUIVAR ROJO</button>
            </div>
        </div>

        <!-- PANTALLA GAME OVER -->
        <div id="screen-gameover">
            <h2 class="gameover-title">¡ROJO!</h2>
            
            <div class="results-box">
                <p style="color: #94a3b8; font-size: 1.1rem; margin-bottom: 10px;">Tocaste el color prohibido</p>
                <div class="result-row">
                    <span>Puntos:</span>
                    <span id="final-score" style="color: #f59e0b;">0</span>
                </div>
                <div class="result-row">
                    <span>Mejor marca:</span>
                    <span id="best-score" style="color: #10b981;">0</span>
                </div>
            </div>
            
            <button class="btn btn-retry" onclick="restartGame()">REINTENTAR</button>
        </div>

    </div>

    <script>
        const colors = [
            { name: 'Blue', hex: '#3b82f6', isRed: false },
            { name: 'Green', hex: '#10b981', isRed: false },
            { name: 'Yellow', hex: '#f59e0b', isRed: false },
            { name: 'Purple', hex: '#8b5cf6', isRed: false },
            { name: 'Red', hex: '#ef4444', isRed: true }
        ];

        let currentScore = 0;
        let highScore = 0;
        
        try {
            highScore = localStorage.getItem('no_red_highscore') || 0;
        } catch (e) {
            console.log("Safe mode active.");
        }
        
        let currentColor = null;
        let hasActionedThisTurn = false;

        document.getElementById('high-score').innerText = highScore;

        function startGame() {
            document.getElementById('screen-start').style.display = 'none';
            document.getElementById('screen-game').style.display = 'flex';
            document.getElementById('screen-gameover').style.display = 'none';
            
            currentScore = 0;
            document.getElementById('score').innerText = currentScore;
            
            nextTurn();
        }

        function nextTurn() {
            hasActionedThisTurn = false;
            
            const randomIndex = Math.floor(Math.random() * colors.length);
            currentColor = colors[randomIndex];
            
            const block = document.getElementById('color-block');
            const prompt = document.getElementById('tap-prompt');
            const dodgeBtn = document.getElementById('dodge-container');
            
            block.style.backgroundColor = currentColor.hex;
            
            if (currentColor.isRed) {
                prompt.innerText = "🚨 ¡ROJO! 🚨";
                prompt.style.color = "#ffffff";
                dodgeBtn.style.display = "flex";
            } else {
                prompt.innerText = "¡TOCA!";
                prompt.style.color = "#ffffff";
                dodgeBtn.style.display = "none";
            }
        }

        function handleBlockTap() {
            if (hasActionedThisTurn) return;

            if (currentColor.isRed) {
                hasActionedThisTurn = true;
                gameOver();
            } else {
                hasActionedThisTurn = true;
                currentScore++;
                document.getElementById('score').innerText = currentScore;
                nextTurn();
            }
        }

        function handleDodge() {
            if (hasActionedThisTurn) return;

            if (currentColor.isRed) {
                hasActionedThisTurn = true;
                currentScore++;
                document.getElementById('score').innerText = currentScore;
                nextTurn();
            }
        }

        function gameOver() {
            if (currentScore > highScore) {
                highScore = currentScore;
                try {
                    localStorage.setItem('no_red_highscore', highScore);
                } catch (e) {}
                document.getElementById('high-score').innerText = highScore;
            }

            document.getElementById('final-score').innerText = currentScore;
            document.getElementById('best-score').innerText = highScore;

            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('screen-gameover').style.display = 'flex';
        }

        function restartGame() {
            startGame();
        }
    </script>
</body>
</html>
